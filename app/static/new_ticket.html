<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create support ticket</title>
  <style>
    :root { font-family: Inter, ui-sans-serif, system-ui, sans-serif; color: #172033; background: #eef2f7; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 24px; }
    main { max-width: 720px; margin: 4vh auto; padding: 30px; background: #fff; border: 1px solid #dce3ed; border-radius: 18px; box-shadow: 0 12px 36px rgba(31,42,68,.08); }
    a { color: #2463b5; text-decoration: none; }
    h1 { margin: 18px 0 6px; font-size: 28px; }
    p { color: #68758a; }
    form { display: grid; gap: 18px; margin-top: 28px; }
    label { display: grid; gap: 7px; font-size: 14px; font-weight: 700; }
    input, select, textarea { width: 100%; padding: 12px 13px; border: 1px solid #ccd6e3; border-radius: 10px; font: inherit; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: #2463b5; box-shadow: 0 0 0 3px #dceaff; }
    textarea { min-height: 170px; resize: vertical; }
    button { justify-self: start; padding: 12px 20px; border: 0; border-radius: 10px; background: #172033; color: #fff; font: inherit; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: .5; cursor: wait; }
    #error { min-height: 20px; margin: 0; color: #b42318; }
  </style>
</head>
<body>
  <main>
    <a href="/">Back to inbox</a>
    <h1>Create a support ticket</h1>
    <p>The support agent will prepare an initial response after submission.</p>
    <form id="ticket-form">
      <label>Customer
        <select id="customer" required><option value="">Select a customer</option></select>
      </label>
      <label>Title
        <input id="title" required minlength="3" maxlength="255">
      </label>
      <label>Description
        <textarea id="description" required minlength="5" maxlength="10000"></textarea>
      </label>
      <p id="error"></p>
      <button id="submit" type="submit">Create ticket</button>
    </form>
  </main>
  <script>
    const form = document.querySelector("#ticket-form");
    const customer = document.querySelector("#customer");
    const submit = document.querySelector("#submit");
    const error = document.querySelector("#error");

    fetch("/api/customers").then(response => response.json()).then(customers => {
      customer.insertAdjacentHTML("beforeend", customers.map(item =>
        `<option value="${item.id}">${escapeHtml(item.company_name)} (#${item.id})</option>`
      ).join(""));
    });

    form.addEventListener("submit", async event => {
      event.preventDefault();
      error.textContent = "";
      submit.disabled = true;
      const response = await fetch("/api/tickets", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          customer_id: Number(customer.value),
          title: document.querySelector("#title").value,
          description: document.querySelector("#description").value
        })
      });
      const data = await response.json();
      if (response.ok) {
        location.href = `/tickets/${data.id}`;
        return;
      }
      error.textContent = data.detail?.[0]?.msg || data.detail || "Could not create ticket.";
      submit.disabled = false;
    });

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = value;
      return div.innerHTML;
    }
  </script>
</body>
</html>
