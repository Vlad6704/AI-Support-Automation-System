<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Draft Reviews</title>
  <style>
    :root { font-family: Inter, ui-sans-serif, system-ui, sans-serif; color: #172033; background: #eef2f7; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    button, textarea, input { font: inherit; }
    .page { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
    .top-nav { display: flex; gap: 8px; padding: 12px 18px 0; }
    .top-nav a { padding: 10px 14px; border-radius: 10px; color: #536176; font-size: 14px; font-weight: 700; text-decoration: none; }
    .top-nav a:hover { background: #fff; }
    .top-nav a.active { background: #172033; color: #fff; }
    .app { display: grid; grid-template-columns: 330px 1fr; min-height: 0; padding: 18px; gap: 18px; }
    .panel { min-height: 0; overflow: hidden; background: #fff; border: 1px solid #dce3ed; border-radius: 18px; box-shadow: 0 12px 36px rgba(31,42,68,.08); }
    .sidebar { display: flex; flex-direction: column; }
    header { padding: 22px 24px; border-bottom: 1px solid #e7ebf1; }
    h1, h2, h3 { margin: 0; }
    h1, h2 { font-size: 20px; }
    h3 { margin-bottom: 8px; font-size: 14px; }
    .eyebrow { margin: 0 0 5px; color: #6c778a; font-size: 12px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; }
    #reviews { overflow-y: auto; padding: 10px; }
    .review { width: 100%; padding: 14px; border: 0; border-radius: 12px; background: transparent; color: inherit; text-align: left; cursor: pointer; }
    .review:hover { background: #f3f6fa; }
    .review.active { background: #eaf2ff; color: #184e9e; }
    .review-meta { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 5px; font-size: 12px; }
    .review-title { overflow: hidden; font-size: 14px; font-weight: 650; text-overflow: ellipsis; white-space: nowrap; }
    .workspace { display: grid; grid-template-rows: auto 1fr; }
    .workspace-body { overflow-y: auto; padding: 24px; background: #f8fafc; }
    .card { margin-bottom: 16px; padding: 18px; border: 1px solid #dfe6ef; border-radius: 14px; background: #fff; }
    .text { margin: 0; color: #4d5b70; line-height: 1.5; white-space: pre-wrap; }
    pre { max-height: 280px; overflow: auto; margin: 0; padding: 14px; border-radius: 10px; background: #172033; color: #dce7f5; white-space: pre-wrap; }
    textarea, input { width: 100%; margin-top: 7px; padding: 12px; border: 1px solid #ccd6e3; border-radius: 10px; outline: none; }
    textarea { min-height: 150px; resize: vertical; }
    #reviewer-notes { min-height: 90px; }
    textarea:focus, input:focus { border-color: #2463b5; box-shadow: 0 0 0 3px #dceaff; }
    label { display: block; margin-bottom: 14px; color: #4d5b70; font-size: 13px; font-weight: 700; }
    form button { padding: 13px 20px; border: 0; border-radius: 11px; background: #172033; color: #fff; font-weight: 700; cursor: pointer; }
    button:disabled { cursor: wait; opacity: .5; }
    .empty { color: #778398; text-align: center; margin-top: 15vh; }
    .result { margin-left: 10px; color: #42644b; font-size: 13px; }
    .history-item { margin-top: 12px; padding: 14px; border-left: 4px solid #9eb5d3; background: #f7f9fc; border-radius: 8px; }
    .history-meta { margin-bottom: 8px; color: #64728a; font-size: 12px; font-weight: 700; }
    @media (max-width: 760px) { .app { grid-template-columns: 1fr; grid-template-rows: 36vh 1fr; padding: 8px; gap: 8px; } }
  </style>
</head>
<body>
  <div class="page">
    <nav class="top-nav" aria-label="Main navigation">
      <a href="/">Support inbox</a>
      <a class="active" href="/reviews">Draft reviews</a>
    </nav>
  <main class="app">
    <aside class="panel sidebar">
      <header><p class="eyebrow">Support team</p><h1>Draft reviews</h1></header>
      <div id="reviews"></div>
    </aside>
    <section class="panel workspace">
      <header><p class="eyebrow" id="review-label">Select a review</p><h2 id="review-title">Review workspace</h2></header>
      <div class="workspace-body" id="workspace"><p class="empty">Choose a draft that requires review.</p></div>
    </section>
  </main>
  </div>
  <script>
    const reviewsEl = document.querySelector("#reviews");
    const workspace = document.querySelector("#workspace");
    const titleEl = document.querySelector("#review-title");
    const labelEl = document.querySelector("#review-label");
    let reviews = [];
    let activeReviewId = null;

    const formatDate = value => new Intl.DateTimeFormat(undefined, {month: "short", day: "numeric", hour: "2-digit", minute: "2-digit"}).format(new Date(value));
    const escapeHtml = value => { const div = document.createElement("div"); div.textContent = value ?? ""; return div.innerHTML; };

    async function loadReviews(selectFirst = false) {
      reviews = await fetch("/api/draft-reviews").then(response => response.json());
      reviewsEl.innerHTML = reviews.length ? reviews.map(review => `
        <button class="review ${review.id === activeReviewId ? "active" : ""}" data-id="${review.id}">
          <div class="review-meta"><span>Ticket #${review.ticket_id}</span><span>${formatDate(review.updated_at)}</span></div>
          <div class="review-title">${escapeHtml(review.ticket_title)}</div>
        </button>`).join("") : '<p class="empty">No drafts require review.</p>';
      reviewsEl.querySelectorAll(".review").forEach(item => item.addEventListener("click", () => openReview(Number(item.dataset.id))));
      if (selectFirst && reviews.length) await openReview(reviews[0].id);
    }

    async function openReview(reviewId) {
      activeReviewId = reviewId;
      const review = await fetch(`/api/draft-reviews/${reviewId}`).then(response => response.json());
      labelEl.textContent = `Ticket #${review.ticket_id} · Review #${review.id}`;
      titleEl.textContent = review.ticket_title;
      workspace.innerHTML = `
        <section class="card"><h3>Ticket information</h3><p class="text">${escapeHtml(review.ticket_description)}</p></section>
        <section class="card"><h3>Agent state</h3><pre>${escapeHtml(JSON.stringify(review.agent_state, null, 2))}</pre></section>
        <section class="card"><h3>Original draft</h3><p class="text">${escapeHtml(review.original_draft)}</p></section>
        <section class="card"><h3>Review history</h3>${renderHistory(review.history)}</section>
        <form class="card" id="review-form">
          <label>Edited draft<textarea id="edited-draft" required>${escapeHtml(review.edited_draft || review.original_draft)}</textarea></label>
          <label>Reviewer notes<textarea id="reviewer-notes">${escapeHtml(review.reviewer_notes || "")}</textarea></label>
          <label>Updated by<input id="updated-by" value="${escapeHtml(review.updated_by || "support_team")}" required></label>
          <button id="submit-review" type="submit">Submit review</button><span class="result" id="result"></span>
        </form>`;
      document.querySelector("#review-form").addEventListener("submit", submitReview);
      await loadReviews();
    }

    async function submitReview(event) {
      event.preventDefault();
      const button = document.querySelector("#submit-review");
      const result = document.querySelector("#result");
      button.disabled = true;
      const response = await fetch(`/api/draft-reviews/${activeReviewId}/submit`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          edited_draft: document.querySelector("#edited-draft").value,
          reviewer_notes: document.querySelector("#reviewer-notes").value || null,
          updated_by: document.querySelector("#updated-by").value
        })
      });
      button.disabled = false;
      if (!response.ok) { result.textContent = "Review submission failed."; return; }
      const data = await response.json();
      result.textContent = data.completed ? "Approved and sent." : "A new review is required.";
      activeReviewId = null;
      await loadReviews(true);
    }

    function renderHistory(history) {
      return history.map((item, index) => `
        <article class="history-item">
          <div class="history-meta">Iteration ${index + 1} · ${escapeHtml(item.status)} · ${formatDate(item.updated_at)}</div>
          <h3>Original draft</h3><p class="text">${escapeHtml(item.original_draft)}</p>
          ${item.edited_draft ? `<h3>Edited draft</h3><p class="text">${escapeHtml(item.edited_draft)}</p>` : ""}
          ${item.reviewer_notes ? `<h3>Reviewer notes</h3><p class="text">${escapeHtml(item.reviewer_notes)}</p>` : ""}
          ${item.guardrail_feedback ? `<h3>Guardrail feedback</h3><p class="text">${escapeHtml(item.guardrail_feedback)}</p>` : ""}
          ${item.updated_by ? `<p class="history-meta">Reviewed by ${escapeHtml(item.updated_by)}</p>` : ""}
        </article>`).join("");
    }

    loadReviews(true);
  </script>
</body>
</html>
