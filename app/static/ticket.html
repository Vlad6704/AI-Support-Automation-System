<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ticket conversation</title>
  <style>
    :root { font-family: Inter, ui-sans-serif, system-ui, sans-serif; color: #172033; background: #eef2f7; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 18px; }
    main { display: grid; grid-template-rows: auto 1fr auto; max-width: 900px; height: calc(100vh - 36px); margin: auto; overflow: hidden; background: #fff; border: 1px solid #dce3ed; border-radius: 18px; box-shadow: 0 12px 36px rgba(31,42,68,.08); }
    header { padding: 22px 26px; border-bottom: 1px solid #e7ebf1; }
    a { color: #2463b5; text-decoration: none; }
    h1 { margin: 15px 0 8px; font-size: 24px; }
    #description { margin: 0; color: #637087; white-space: pre-wrap; }
    #messages { overflow-y: auto; padding: 26px; background: #f8fafc; }
    .message { width: fit-content; max-width: 78%; margin-bottom: 16px; padding: 13px 15px; border: 1px solid #e1e7ef; border-radius: 15px 15px 15px 4px; background: #fff; line-height: 1.45; white-space: pre-wrap; }
    .message.user { margin-left: auto; border: 0; border-radius: 15px 15px 4px; background: #2463b5; color: #fff; }
    .meta { margin-top: 7px; font-size: 11px; opacity: .65; }
    .waiting { color: #738096; text-align: center; }
    form { display: flex; gap: 12px; padding: 18px; border-top: 1px solid #e7ebf1; }
    textarea { flex: 1; min-height: 48px; max-height: 140px; padding: 12px; border: 1px solid #ccd6e3; border-radius: 10px; resize: vertical; font: inherit; }
    button { align-self: end; padding: 12px 18px; border: 0; border-radius: 10px; background: #172033; color: #fff; font: inherit; font-weight: 700; cursor: pointer; }
    button:disabled, textarea:disabled { opacity: .5; cursor: wait; }
  </style>
</head>
<body>
  <main>
    <header>
      <a href="/">Back to inbox</a>
      <h1 id="title">Loading ticket...</h1>
      <p id="description"></p>
    </header>
    <section id="messages"><p class="waiting">Waiting for the support agent...</p></section>
    <form id="message-form">
      <textarea id="message" placeholder="Write a new message..." disabled required></textarea>
      <button id="submit" type="submit" disabled>Send message</button>
    </form>
  </main>
  <script>
    const ticketId = Number(location.pathname.split("/").pop());
    const messagesEl = document.querySelector("#messages");
    const form = document.querySelector("#message-form");
    const input = document.querySelector("#message");
    const submit = document.querySelector("#submit");
    let firstAgentResponseReceived = false;
    let polling = null;

    async function loadTicket() {
      const ticket = await fetch(`/api/tickets/${ticketId}`).then(response => response.json());
      document.title = `Ticket #${ticket.id}`;
      document.querySelector("#title").textContent = ticket.title;
      document.querySelector("#description").textContent = ticket.description;
    }

    async function loadMessages() {
      const messages = await fetch(`/api/tickets/${ticketId}/messages`).then(response => response.json());
      firstAgentResponseReceived = messages.some(item => item.source === "support_team");
      input.disabled = !firstAgentResponseReceived;
      submit.disabled = !firstAgentResponseReceived;
      messagesEl.innerHTML = messages.map(item => `
        <article class="message ${item.source}">
          ${escapeHtml(item.message)}
          <div class="meta">${item.source === "user" ? "You" : "Support agent"} · ${formatDate(item.created_at)}</div>
        </article>
      `).join("") + (!firstAgentResponseReceived ? '<p class="waiting">Waiting for the support agent...</p>' : "");
      messagesEl.scrollTop = messagesEl.scrollHeight;
      if (firstAgentResponseReceived && polling) {
        clearInterval(polling);
        polling = null;
      }
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      const message = input.value.trim();
      if (!message || !firstAgentResponseReceived) return;
      input.disabled = true;
      submit.disabled = true;
      const response = await fetch(`/api/tickets/${ticketId}/messages`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message})
      });
      if (response.ok) input.value = "";
      await loadMessages();
      input.disabled = false;
      submit.disabled = false;
    });

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = value;
      return div.innerHTML;
    }
    const formatDate = value => new Intl.DateTimeFormat(undefined, {month: "short", day: "numeric", hour: "2-digit", minute: "2-digit"}).format(new Date(value));

    Promise.all([loadTicket(), loadMessages()]).then(() => {
      if (!firstAgentResponseReceived) polling = setInterval(loadMessages, 5000);
    });
  </script>
</body>
</html>
