<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Support Inbox</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      color: #172033;
      background: #eef2f7;
    }
    * { box-sizing: border-box; }
    body { margin: 0; }
    button, textarea { font: inherit; }
    .app {
      display: grid;
      grid-template-columns: 330px 1fr;
      height: 100vh;
      padding: 18px;
      gap: 18px;
    }
    .panel {
      min-height: 0;
      overflow: hidden;
      background: #fff;
      border: 1px solid #dce3ed;
      border-radius: 18px;
      box-shadow: 0 12px 36px rgba(31, 42, 68, .08);
    }
    .sidebar { display: flex; flex-direction: column; }
    .sidebar header, .conversation header {
      padding: 22px 24px;
      border-bottom: 1px solid #e7ebf1;
    }
    .conversation header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    h1, h2 { margin: 0; font-size: 20px; }
    .new-ticket {
      display: block;
      margin: 14px 20px 4px;
      padding: 11px 14px;
      border-radius: 10px;
      background: #172033;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
    }
    .eyebrow {
      margin: 0 0 5px;
      color: #6c778a;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .09em;
      text-transform: uppercase;
    }
    #tickets { overflow-y: auto; padding: 10px; }
    .ticket {
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: inherit;
      text-align: left;
      cursor: pointer;
    }
    .ticket:hover { background: #f3f6fa; }
    .ticket.active { background: #eaf2ff; color: #184e9e; }
    .ticket-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 5px;
      font-size: 12px;
    }
    .ticket-title {
      overflow: hidden;
      font-size: 14px;
      font-weight: 650;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .conversation {
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    #messages {
      overflow-y: auto;
      padding: 28px;
      background: #f8fafc;
    }
    .message {
      width: fit-content;
      max-width: min(680px, 78%);
      margin-bottom: 18px;
      padding: 13px 15px;
      border-radius: 15px 15px 15px 4px;
      background: #fff;
      border: 1px solid #e1e7ef;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .message.support_team {
      margin-left: auto;
      border: 0;
      border-radius: 15px 15px 4px;
      background: #2463b5;
      color: #fff;
    }
    .message-meta { margin-top: 7px; font-size: 11px; opacity: .65; }
    form {
      display: flex;
      align-items: end;
      gap: 12px;
      padding: 18px;
      border-top: 1px solid #e7ebf1;
    }
    textarea {
      flex: 1;
      min-height: 48px;
      max-height: 160px;
      resize: vertical;
      padding: 13px 14px;
      border: 1px solid #ccd6e3;
      border-radius: 12px;
      outline: none;
    }
    textarea:focus { border-color: #2463b5; box-shadow: 0 0 0 3px #dceaff; }
    form button {
      padding: 13px 20px;
      border: 0;
      border-radius: 11px;
      background: #172033;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .refresh {
      padding: 9px 13px;
      border: 1px solid #ccd6e3;
      border-radius: 10px;
      background: #fff;
      color: #34425a;
      font-weight: 650;
      cursor: pointer;
    }
    .refresh:hover { background: #f3f6fa; }
    .refresh:disabled { cursor: not-allowed; opacity: .45; }
    form button:disabled { cursor: not-allowed; opacity: .45; }
    .empty { color: #778398; text-align: center; margin-top: 15vh; }
    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 36vh 1fr; padding: 8px; gap: 8px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="panel sidebar">
      <header>
        <p class="eyebrow">Workspace</p>
        <h1>Support inbox</h1>
      </header>
      <a class="new-ticket" href="/tickets/new">Create new ticket</a>
      <div id="tickets"></div>
    </aside>

    <section class="panel conversation">
      <header>
        <div>
          <p class="eyebrow" id="ticket-label">Select a ticket</p>
          <h2 id="ticket-title">Conversation</h2>
        </div>
        <button class="refresh" id="refresh" type="button" disabled>Refresh</button>
      </header>
      <div id="messages"><p class="empty">Choose a ticket to view its messages.</p></div>
      <form id="reply-form">
        <textarea id="reply" placeholder="Write a support reply..." disabled></textarea>
        <button id="submit" type="submit" disabled>Send reply</button>
      </form>
    </section>
  </main>

  <script>
    const ticketsEl = document.querySelector("#tickets");
    const messagesEl = document.querySelector("#messages");
    const titleEl = document.querySelector("#ticket-title");
    const labelEl = document.querySelector("#ticket-label");
    const form = document.querySelector("#reply-form");
    const reply = document.querySelector("#reply");
    const submit = document.querySelector("#submit");
    const refresh = document.querySelector("#refresh");
    let tickets = [];
    let activeTicketId = null;

    const formatDate = value => new Intl.DateTimeFormat(undefined, {
      month: "short", day: "numeric", hour: "2-digit", minute: "2-digit"
    }).format(new Date(value));

    async function loadTickets(selectFirst = false) {
      tickets = await fetch("/api/tickets").then(response => response.json());
      ticketsEl.innerHTML = tickets.map(ticket => `
        <button class="ticket ${ticket.id === activeTicketId ? "active" : ""}" data-id="${ticket.id}">
          <div class="ticket-top"><span>Ticket #${ticket.id}</span><span>${formatDate(ticket.updated_at)}</span></div>
          <div class="ticket-title">${escapeHtml(ticket.title)}</div>
        </button>
      `).join("");
      ticketsEl.querySelectorAll(".ticket").forEach(item => {
        item.addEventListener("click", () => openTicket(Number(item.dataset.id)));
      });
      if (selectFirst && tickets.length) openTicket(tickets[0].id);
    }

    async function openTicket(ticketId) {
      activeTicketId = ticketId;
      const ticket = tickets.find(item => item.id === ticketId);
      labelEl.textContent = `Ticket #${ticketId}`;
      titleEl.textContent = ticket?.title || "Conversation";
      reply.disabled = false;
      submit.disabled = false;
      refresh.disabled = false;
      await loadTickets();
      const messages = await fetch(`/api/tickets/${ticketId}/messages`).then(response => response.json());
      messagesEl.innerHTML = messages.length ? messages.map(item => `
        <article class="message ${item.source}">
          ${escapeHtml(item.message)}
          <div class="message-meta">${item.source === "user" ? "Customer" : "Support team"} · ${formatDate(item.created_at)}</div>
        </article>
      `).join("") : '<p class="empty">No messages yet.</p>';
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      const message = reply.value.trim();
      if (!activeTicketId || !message) return;
      submit.disabled = true;
      const response = await fetch(`/api/tickets/${activeTicketId}/messages`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message})
      });
      submit.disabled = false;
      if (!response.ok) return;
      reply.value = "";
      await openTicket(activeTicketId);
    });

    refresh.addEventListener("click", async () => {
      if (!activeTicketId) return;
      refresh.disabled = true;
      await openTicket(activeTicketId);
      refresh.disabled = false;
    });

    function escapeHtml(value) {
      const div = document.createElement("div");
      div.textContent = value;
      return div.innerHTML;
    }

    loadTickets(true);
  </script>
</body>
</html>
